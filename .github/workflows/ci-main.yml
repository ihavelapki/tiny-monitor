name: Main Release Gate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: main-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend release check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/showapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/showapp/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend release check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/backapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry

      - run: pipx install poetry
      - run: poetry install --no-interaction
      - run: poetry run ruff check .
      - run: poetry run pytest

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0

  agent-deb:
    name: Build and inspect deb
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt lintian

      - name: ShellCheck
        run: find monitor -type f -name "*.sh" -print0 | xargs -0 shellcheck

      - name: shfmt check
        run: find monitor -type f -name "*.sh" -print0 | xargs -0 shfmt -d -i 2 -ci

      - name: Build deb
        run: |
          chmod +x ./scripts/build-deb.sh
          ./scripts/build-deb.sh "0.0.0-${GITHUB_SHA::7}"

      - name: Inspect deb
        run: |
          dpkg-deb --info dist/*.deb
          dpkg-deb --contents dist/*.deb

      - name: Lint deb
        run: lintian dist/*.deb || true

      - uses: actions/upload-artifact@v4
        with:
          name: tiny-monitor-agent-main-pr
          path: dist/*.deb
          if-no-files-found: error

  docker-build:
    name: Docker release build smoke
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend image without push
        uses: docker/build-push-action@v6
        with:
          context: frontend/showapp
          file: frontend/showapp/Dockerfile
          push: false
          tags: tiny-monitor-frontend:main-pr

      - name: Build backend image without push
        uses: docker/build-push-action@v6
        with:
          context: backend/backapp
          file: backend/backapp/Dockerfile
          push: false
          tags: tiny-monitor-backend:main-pr