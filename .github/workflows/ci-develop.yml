name: Develop CI

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: develop-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/showapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/showapp/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/backapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry

      - run: pipx install poetry
      - run: poetry install --no-interaction
      - run: poetry run ruff check .
      - run: poetry run pytest

  agent:
    name: Shell agent check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - run: find monitor -type f -name "*.sh" -print0 | xargs -0 shellcheck
      - run: find monitor -type f -name "*.sh" -print0 | xargs -0 shfmt -d -i 2 -ci

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend image without push
        uses: docker/build-push-action@v6
        with:
          context: frontend/showapp
          file: frontend/showapp/Dockerfile
          push: false
          tags: tiny-monitor-frontend:develop-pr

      - name: Build backend image without push
        uses: docker/build-push-action@v6
        with:
          context: backend/backapp
          file: backend/backapp/Dockerfile
          push: false
          tags: tiny-monitor-backend:develop-pr