name: Release by Tag

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  DOCKERHUB_NAMESPACE: ihavelapki
  FRONTEND_IMAGE: tiny-monitor-frontend
  BACKEND_IMAGE: tiny-monitor-backend

jobs:
  docker-release:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="$(echo "$VERSION" | cut -d. -f1)"
          MINOR="$(echo "$VERSION" | cut -d. -f2)"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend/showapp
          file: frontend/showapp/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:v${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:v${{ steps.version.outputs.major }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend/backapp
          file: backend/backapp/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:v${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:v${{ steps.version.outputs.major }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest

  deb-release:
    name: Build deb package
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install deb tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lintian

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build deb
        run: |
          chmod +x ./scripts/build-deb.sh
          ./scripts/build-deb.sh "${{ steps.version.outputs.version }}"

      - name: Inspect deb
        run: |
          dpkg-deb --info dist/*.deb
          dpkg-deb --contents dist/*.deb

      - name: Lint deb
        run: lintian dist/*.deb || true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.deb > checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: tiny-monitor-agent-release
          path: |
            dist/*.deb
            dist/checksums.txt
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - docker-release
      - deb-release

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tiny-monitor-agent-release
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.deb
            release-artifacts/checksums.txt
          generate_release_notes: true